name: CI/CD Pipeline
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
env:
  DOCKER-IMAGE-NAME: ci_web_app
jobs:
  build-and-push:
    runs-on: ubuntu-latest
  steps:
    - name: checkout code
      users: actions/checkout@v3

    - name: setup docker buildx
      users: docker/setup-buildx-action@v3

    - name: Login to docker hub
      users: docker/login-action@v2

    - with:
      username:${{secrets.DOCKER_USERNAME}}
      password:${{secrets.DOCKER_PASSWORD}}

    - name: build and push docker image
      users: docker/build-push-action@v4
    - with:
      context: .
      push: true
      tags: |
      ${{secrets.DOCKER_USERNAME}}/${{env.DOCKER-IMAGE-NAME: latest}}